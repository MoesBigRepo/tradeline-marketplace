  :root {
    --bg-base: #060a13;
    --accent: #52acf2;
    --green: #3ddba8;
    --amber: #f7b040;
    --glass-bg: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.09);
    --text-primary: rgba(232,238,250,0.96);
    --text-secondary: rgba(200,218,244,0.88);
    --text-tertiary: rgba(160,182,218,0.78);
    --font: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --radius-lg: 20px;
    --shadow-card: 0 8px 32px rgba(0,0,0,0.45), 0 0 0 1px var(--glass-border);
  }

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: var(--font);
    background: var(--bg-base);
    color: var(--text-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* === Background gradients === */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(82,172,242,0.07) 0%, transparent 58%),
      radial-gradient(ellipse 60% 50% at 80% 85%, rgba(61,219,168,0.04) 0%, transparent 58%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(82,172,242,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* === Grid overlay === */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 64px 64px;
    pointer-events: none;
    z-index: 0;
  }

  /* === Glass card === */
  .card {
    position: relative;
    z-index: 1;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    backdrop-filter: blur(24px) saturate(1.2);
    -webkit-backdrop-filter: blur(24px) saturate(1.2);
    padding: clamp(32px, 6vw, 56px) clamp(28px, 6vw, 64px);
    max-width: 440px;
    width: calc(100% - 32px);
    text-align: center;
  }

  /* === Brand icon === */
  .brand-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--green));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 900;
    color: #fff;
    margin: 0 auto 20px;
  }

  /* === Typography === */
  .card h1 {
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1.15;
    margin-bottom: 8px;
  }

  .card h1 .gradient {
    background: linear-gradient(135deg, var(--accent), var(--green));
    -webkit-background-clip: text;

<div class="card">

  </div>
</div>

<script>
// Show redirect notice, then navigate.
// This is a progressive enhancement — the page works fully without JS.
// The <meta http-equiv="refresh"> handles redirect in non-JS environments.
// The <a> button works in ALL environments including iOS Quick Look.
(function() {
  var notice = document.getElementById('redirect-notice');
  if (notice) notice.classList.add('visible');

  // Redirect after a brief moment so the user sees something
  setTimeout(function() {
    window.location.replace('https://moesbigrepo.github.io/tradeline-marketplace/');
  }, 800);
})();
</script>
